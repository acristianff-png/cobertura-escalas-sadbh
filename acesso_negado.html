<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acesso negado &middot; SAD BH</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#f4f6f9;color:#1b2438;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border:1px solid #e4e8ef;border-radius:14px;padding:40px;width:100%;max-width:420px;text-align:center}
.icon{width:64px;height:64px;background:#fdecea;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;border:2px solid #f5b8b2}
h1{font-size:20px;font-weight:700;color:#c0392b;margin-bottom:8px}
p{font-size:13px;color:#6b7a96;line-height:1.6;margin-bottom:16px}
.email{font-size:12px;color:#a0abbe;background:#f4f6f9;border:1px solid #e4e8ef;border-radius:8px;padding:8px 16px;display:inline-block;margin-bottom:24px}
small{font-size:11px;color:#a0abbe}
</style>
</head>
<body>
<div class="card">
  <div class="icon">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
      <circle cx="12" cy="12" r="10" stroke="#c0392b" stroke-width="1.8"/>
      <path d="M15 9L9 15M9 9l6 6" stroke="#c0392b" stroke-width="1.8" stroke-linecap="round"/>
    </svg>
  </div>
  <h1>Acesso n&#227;o autorizado</h1>
  <p>Seu e-mail n&#227;o est&#225; na lista de usu&#225;rios permitidos.<br>Entre em contato com o gestor do SAD BH.</p>
  <div class="email" id="email-display">verificando...</div>
  <br>
  <small>Cobertura de Escalas &middot; SAD BH</small>
</div>
<script>
const API_URL='https://script.google.com/macros/s/AKfycbxmcYh6y_pp5e_VyfHXpA74cS6hU0xyIK87tFPxmy0lI2hRZ0i6ZrExfgM8yceilpn_/exec';
(async()=>{
  try{
    const url=new URL(API_URL); url.searchParams.set('acao','meu_acesso');
    const r=await fetch(url.toString()); const d=await r.json();
    document.getElementById('email-display').textContent=d.email||'e-mail n\u00e3o identificado';
  }catch(e){document.getElementById('email-display').textContent='erro ao verificar';}
})();
</script>
</body>
</html>
