<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cobertura de Escalas &middot; SAD BH</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#f4f6f9;color:#1b2438;min-height:100vh;display:flex;align-items:center;justify-content:center}
.c{text-align:center;padding:40px}
.icon{width:64px;height:64px;background:#2e7d4f;border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
h1{font-size:20px;font-weight:700;margin-bottom:6px}
p{font-size:13px;color:#6b7a96;margin-bottom:24px}
.dots span{display:inline-block;width:8px;height:8px;border-radius:50%;background:#2e7d4f;animation:p 1.2s ease-in-out infinite;margin:0 3px}
.dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
@keyframes p{0%,80%,100%{opacity:.2}40%{opacity:1}}
.err{background:#fdecea;border:1px solid #f5b8b2;border-radius:10px;padding:16px 20px;color:#c0392b;font-size:13px;margin-top:20px;max-width:360px;text-align:left}
a{color:#2e7d4f;font-weight:500}
</style>
<script src="auth.js"></script>
</head>
<body>
<div class="c">
  <div class="icon">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
      <rect x="3" y="4" width="18" height="16" rx="2" stroke="#fff" stroke-width="1.8"/>
      <path d="M3 9h18" stroke="#fff" stroke-width="1.8"/>
      <path d="M8 2v4M16 2v4" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M7 14h4M7 17h6" stroke="rgba(255,255,255,.6)" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
  </div>
  <h1>Cobertura de Escalas</h1>
  <p>SAD BH &middot; Verificando acesso...</p>
  <div class="dots"><span></span><span></span><span></span></div>
  <div id="err"></div>
</div>
<script>
// A URL da sua API (Web App do Google)
const API_URL = 'https://script.google.com/macros/s/AKfycbxmcYh6y_pp5e_VyfHXpA74cS6hU0xyIK87tFPxmy0lI2hRZ0i6ZrExfgM8yceilpn_/exec';

async function init() {
  try {
    const url = new URL(API_URL);
    url.searchParams.set('acao', 'meu_acesso');
    if (window.gsiCredential) url.searchParams.set('token', window.gsiCredential);
    const response = await fetch(url.toString(), {
      method: 'GET',
      mode: 'cors',
      redirect: 'follow'
    });

    // Se a resposta não for OK, dispara erro para o catch
    if (!response.ok) throw new Error('Resposta da rede não foi satisfatória');

    const d = await response.json();

    if (d && d.ok) {
      // Se o acesso for confirmado, vai para o painel
      window.location.href = 'painel.html';
    } else {
      // Se não tiver acesso, vai para a página de erro
      window.location.href = 'acesso_negado.html';
    }
  } catch (e) {
    console.error('Erro detalhado:', e);
    document.getElementById('err').innerHTML = `
      <div class="err">
        <strong>Erro de Conexão</strong><br>
        O navegador bloqueou a requisição ou você não está logado no Google.<br>
        <small>${e.message}</small><br><br>
        <a href="painel.html">Tentar acessar painel diretamente &rarr;</a>
      </div>`;
  }
}

authReady(init);
</script>
</body>
</html>
